<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Negro con Menú Blanco Secreto</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Indica que se puede clicar */
        }

        /* Estilos del Menú (Modificados a Blanco) */
        #menu-secreto {
            display: none; /* Oculto por defecto */
            text-align: center;
            background-color: #ffffff; /* Fondo Blanco */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3); /* Sombra suave */
            cursor: default; /* Cursor normal dentro del menú */
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 20px 0;
        }

        a {
            color: #000000; /* Texto Negro */
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 1.5rem;
            transition: color 0.3s, background-color 0.3s;
            padding: 10px 20px;
            border-radius: 5px;
        }

        a:hover {
            color: #ffffff;
            background-color: #333333; /* Fondo oscuro al pasar el ratón */
        }
    </style>
</head>
<body id="cuerpo" onclick="interaccionPantalla(event)">

    <div id="menu-secreto" onclick="event.stopPropagation()"> <ul>
            <li><a href="#" onclick="reiniciar()">Inicio</a></li>
            <li><a href="#" onclick="reiniciar()">Home</a></li>
            <li><a href="#" onclick="reiniciar(true)">Salir</a></li>
        </ul>
    </div>

    <script>
        let contador = 0;
        const bodyEl = document.getElementById('cuerpo');
        const menuEl = document.getElementById('menu-secreto');

        function interaccionPantalla(event) {
            contador++;
            
            // Si llega a 3 clics, muestra el menú
            if (contador === 3) {
                menuEl.style.display = 'block';
                bodyEl.style.cursor = 'default';
            }
        }

        function reiniciar(recargar = false) {
            contador = 0; // Reinicia la racha
            menuEl.style.display = 'none'; // Oculta el menú
            bodyEl.style.cursor = 'pointer'; // Vuelve a poner el cursor de "clic"

            if (recargar) {
                // Si es "Salir", simplemente recargamos para simular la salida
                location.reload();
            }
        }
    </script>
</body>
</html>
