<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Negro con Menú Secreto</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; /* Indica que se puede clicar */
        }

        /* Estilos del Menú */
        #menu-secreto {
            display: none; /* Oculto por defecto */
            text-align: center;
            background: rgba(30, 30, 30, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 20px 0;
        }

        a {
            color: white;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 1.5rem;
            transition: color 0.3s;
        }

        a:hover {
            color: #00ffcc; /* Color neón al pasar el mouse */
        }
    </style>
</head>
<body onclick="contarClics()">

    <div id="menu-secreto">
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Home</a></li>
            <li><a href="#" onclick="location.reload()">Salir</a></li>
        </ul>
    </div>

    <script>
        let contador = 0;

        function contarClics() {
            contador++;
            
            // Si llega a 3 clics, muestra el menú
            if (contador === 3) {
                document.getElementById('menu-secreto').style.display = 'block';
                // Cambiamos el cursor a normal para que el usuario interactúe con el menú
                document.body.style.cursor = 'default';
            }
        }
    </script>
</body>
</html>
